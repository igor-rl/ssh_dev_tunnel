services:
  app:
    build:
      dockerfile: Dockerfile
      target: development
    container_name: dev-tunnel
    user: "1000:1000"
    ports:
      - "2222:2222"
    environment:
      - HOST_PROJECT_PATH=${PWD}
    volumes:
      - ./:/app
      - tunnel-data:/home/tunnel/.dev_tunnel
    tty: true
    stdin_open: true

volumes:
  tunnel-data: